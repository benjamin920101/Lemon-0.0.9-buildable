name: lemon 0.0.9 buildable debugger

on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest 

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 8
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: debugger
      run: ./gradlew clean build --info --stacktrace --rerun-tasks --no-daemon 

      
    - name: debugger2
      run: ./gradlew build --scan
      
      
      

      
